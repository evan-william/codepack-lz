<svg width="1180" height="560" viewBox="0 0 1180 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodePack-LZ context modes</title>
  <desc id="desc">A simple technical diagram showing readable output and lossless capsule output.</desc>
  <rect width="1180" height="560" fill="#FFFFFF"/>
  <rect x="24" y="24" width="1132" height="512" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>

  <text x="64" y="76" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">One command, two outputs</text>
  <text x="64" y="108" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="16">Use readable files for chat. Use capsules for exact restore and tool workflows.</text>

  <rect x="64" y="170" width="240" height="108" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="88" y="207" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Repository</text>
  <text x="88" y="236" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">source, tests, docs</text>
  <text x="88" y="259" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">ignore rules and secret scan</text>

  <line x1="330" y1="224" x2="416" y2="224" stroke="#6B7280" stroke-width="1.6"/>
  <path d="M406 214L418 224L406 234" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="444" y="154" width="278" height="140" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="468" y="194" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">codepack pack</text>
  <text x="468" y="226" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">walk -> scan -> render</text>
  <text x="468" y="250" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">deterministic output from one binary</text>

  <line x1="748" y1="194" x2="822" y2="194" stroke="#6B7280" stroke-width="1.6"/>
  <path d="M812 184L824 194L812 204" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="748" y1="254" x2="822" y2="254" stroke="#6B7280" stroke-width="1.6"/>
  <path d="M812 244L824 254L812 264" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="852" y="128" width="264" height="110" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="876" y="164" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Readable context</text>
  <text x="876" y="193" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">md / xml / txt for normal chats</text>
  <text x="876" y="216" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">token-labeled and splittable</text>

  <rect x="852" y="272" width="264" height="110" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="876" y="308" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Lossless capsule</text>
  <text x="876" y="337" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">.codepack.txt for tools</text>
  <text x="876" y="360" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">compressed, restorable, verified</text>

  <rect x="64" y="422" width="1052" height="70" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="88" y="451" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Note</text>
  <text x="88" y="475" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="14">A capsule is not meant to be pasted into a normal chat. It is useful when a tool can decode, search, read, or unpack it.</text>
</svg>
