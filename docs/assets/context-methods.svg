<svg width="1180" height="560" viewBox="0 0 1180 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Context sharing method comparison</title>
  <desc id="desc">A qualitative comparison of common ways to give code context to AI systems.</desc>
  <rect width="1180" height="560" rx="26" fill="#0B1020"/>
  <text x="52" y="72" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">How code context usually travels to AI</text>
  <text x="52" y="108" fill="#A7B0C0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Qualitative scoring: more filled blocks means stronger for that property.</text>

  <text x="348" y="154" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Chat-readable</text>
  <text x="520" y="154" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Low tokens</text>
  <text x="674" y="154" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Lossless</text>
  <text x="818" y="154" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Safe by default</text>
  <text x="1012" y="154" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Agent-ready</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
    <text x="58" y="210" fill="#F8FAFC" font-weight="750">Raw copy/paste</text>
    <text x="58" y="282" fill="#F8FAFC" font-weight="750">Zip/base64 blob</text>
    <text x="58" y="354" fill="#F8FAFC" font-weight="750">One-way repo digest</text>
    <text x="58" y="426" fill="#F8FAFC" font-weight="750">CodePack readable</text>
    <text x="58" y="498" fill="#F8FAFC" font-weight="750">CodePack capsule + MCP</text>
  </g>

