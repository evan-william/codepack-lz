<svg width="1180" height="520" viewBox="0 0 1180 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Readable token benchmark</title>
  <desc id="desc">Monochrome bar chart comparing estimated tokens for default and compressed readable output.</desc>
  <rect width="1180" height="520" fill="#FFFFFF"/>
  <rect x="24" y="24" width="1132" height="472" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>

  <text x="64" y="76" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Estimated readable tokens</text>
  <text x="64" y="108" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="16">This repository, 75 packed files, CodePack-LZ v0.3.1 heuristic estimator.</text>

  <line x1="150" y1="400" x2="1060" y2="400" stroke="#9CA3AF"/>
  <line x1="150" y1="170" x2="150" y2="400" stroke="#9CA3AF"/>
  <line x1="150" y1="285" x2="1060" y2="285" stroke="#E5E7EB"/>
  <line x1="150" y1="170" x2="1060" y2="170" stroke="#E5E7EB"/>
  <text x="104" y="405" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="13">0</text>
  <text x="88" y="290" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="13">45k</text>
  <text x="88" y="175" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="13">90k</text>

  <rect x="286" y="181" width="230" height="219" fill="#111827"/>
  <rect x="668" y="309" width="230" height="91" fill="#6B7280"/>

  <text x="286" y="156" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">86,608</text>
  <text x="668" y="284" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">35,769</text>
  <text x="254" y="438" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Readable Markdown</text>
  <text x="620" y="438" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Compressed readable Markdown</text>
  <text x="64" y="474" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="14">Compression and pruning reduced estimated readable input tokens by 58.7% on this repo.</text>
</svg>
