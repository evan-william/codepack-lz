name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (CGO disabled)
        run: go build ./...
        env:
          CGO_ENABLED: "0"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1
      - name: Test (race)
        if: runner.os == 'Linux'
        run: go test ./... -race -count=1

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: gofmt
        run: |
          out=$(gofmt -l cmd internal)
          if [ -n "$out" ]; then echo "gofmt needed on:"; echo "$out"; exit 1; fi
      - name: VS Code extension syntax
        run: node --check vscode-extension/extension.js
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  cross-compile:
    name: cross-compile (CGO_ENABLED=0)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        run: go build ./...
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

  secret-scan-gate:
    name: dogfood secret gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Pack this repo; exit 3 would mean leaked credentials
        run: |
          go build -o codepack ./cmd/codepack
          ./codepack pack . --format md --count-tokens off -o /dev/null
