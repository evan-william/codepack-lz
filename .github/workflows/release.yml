name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: build and publish release assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p build dist
          bin="codepack"
          if [ "${GOOS}" = "windows" ]; then bin="codepack.exe"; fi
          go build \
            -ldflags "-s -w -X github.com/evan-william/codepack-lz/internal/version.Version=${version}" \
            -o "build/${bin}" \
            ./cmd/codepack
          name="codepack-lz_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            (cd build && zip -q "../dist/${name}.zip" "${bin}")
          else
            tar -C build -czf "dist/${name}.tar.gz" "${bin}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codepack-lz-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    name: publish GitHub release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "CodePack-LZ ${GITHUB_REF_NAME}" \
            --generate-notes
